title: "RunMarshal"
description: "RunMarshal 的个人主页，展示项目、动态和联系方式。"
repository: "RunMarshal/RunMarshal.github.io"
google_scholar_stats_use_cdn: false

google_analytics_id:

google_site_verification:
bing_site_verification:
baidu_site_verification:

author:
  name: "RunMarshal"
  avatar: "images/avatar-placeholder.svg"
  bio: "AI / Memory / Systems"
  location: "Shanghai, China"
  employer: "Independent Researcher"
  email: "runmarshal@example.com"
  github: "RunMarshal"
  linkedin: "runmarshal"
  googlescholar: "https://scholar.google.com/citations?user=RUNMARSHAL"
  uri: "https://runmarshal.github.io"

include:
  - .htaccess
  - _pages
  - files

exclude:
  - acad-homepage.github.io
  - docs
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - Gemfile
  - Gemfile.lock
  - README
  - node_modules
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Asia/Shanghai

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

compress_html:
  clippings: all
  ignore:
    envs: development
